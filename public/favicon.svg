<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Soft pink circle background -->
  <circle cx="64" cy="64" r="60" fill="#F5D5CB" opacity="0.4"/>
  <!-- Lotus flower - simplified line drawing matching their logo -->
  <g fill="none" stroke="#3D3330" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center petal -->
    <path d="M64 28 C58 48, 52 60, 50 72 C50 80, 56 86, 64 88 C72 86, 78 80, 78 72 C76 60, 70 48, 64 28Z" fill="#F5D5CB" fill-opacity="0.3"/>
    <!-- Left petal -->
    <path d="M44 42 C38 54, 32 64, 30 74 C30 80, 36 84, 44 84 C52 82, 56 78, 54 72 C52 64, 48 52, 44 42Z" fill="#F5D5CB" fill-opacity="0.2"/>
    <!-- Right petal -->
    <path d="M84 42 C90 54, 96 64, 98 74 C98 80, 92 84, 84 84 C76 82, 72 78, 74 72 C76 64, 80 52, 84 42Z" fill="#F5D5CB" fill-opacity="0.2"/>
    <!-- Far left petal -->
    <path d="M30 56 C26 64, 22 72, 22 78 C22 82, 28 84, 34 82 C40 80, 42 76, 40 72 C38 66, 34 60, 30 56Z" fill="#F5D5CB" fill-opacity="0.15"/>
    <!-- Far right petal -->
    <path d="M98 56 C102 64, 106 72, 106 78 C106 82, 100 84, 94 82 C88 80, 86 76, 88 72 C90 66, 94 60, 98 56Z" fill="#F5D5CB" fill-opacity="0.15"/>
    <!-- Base/calyx -->
    <path d="M48 86 C52 94, 58 98, 64 100 C70 98, 76 94, 80 86"/>
  </g>
  <style>
    @media (prefers-color-scheme: dark) {
      circle { fill: #F5D5CB; opacity: 0.2; }
      g { stroke: #F5D5CB; }
    }
  </style>
</svg>
